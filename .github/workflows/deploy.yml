#
# .github/workflows/deploy.yml — автоматический деплой на tsekh-1 при push в main
# через deploy-rs с magic rollback (защита от SSH-lockout).
#
# Pipeline:
#   1. Checkout + Setup Nix + Setup SSH
#   2. deploy-rs check — статическая валидация конфигурации
#   3. deploy-rs deploy — рантайм деплой:
#      a. Build closure локально на runner
#      b. Push closure на сервер через SSH
#      c. Schedule activation на сервере с magic rollback таймером (180s)
#      d. nixos-rebuild switch на сервере
#      e. Если SSH-доступ работает — runner отправляет confirmation (deploy-rs внутри)
#      f. Если confirmation не приходит за 180s — сервер автоматически откатывается
#         на предыдущую generation (через scheduled at job на сервере)
#
# Защита покрывает:
#   ✅ Сборочные ошибки (nixos-rebuild fail) → отказ деплоя, prev gen
#   ✅ Логические ошибки (config валиден, ломает сервисы) → activation hangs → rollback
#   ✅ SSH lockout (sshd misconfigured) → confirmation не доходит → rollback
#   ✅ Network firewall lockout → confirmation не доходит → rollback
#
# Не покрывает: physical hardware fault, accidental encryption-key loss.
#
# Требует GitHub Secrets:
#   SSH_PRIVATE_KEY  — приватный SSH-ключ с доступом root@95.216.75.148
#   SSH_KNOWN_HOSTS  — вывод: ssh-keyscan 95.216.75.148

name: Deploy to tsekh-1

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: deploy-rs (magic rollback)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: "${{ secrets.SSH_PRIVATE_KEY }}"
          SSH_KNOWN_HOSTS: "${{ secrets.SSH_KNOWN_HOSTS }}"
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          [ -s ~/.ssh/id_ed25519 ] || { echo "::error::SSH_PRIVATE_KEY secret пуст"; exit 1; }
          [ -s ~/.ssh/known_hosts ] || { echo "::error::SSH_KNOWN_HOSTS secret пуст"; exit 1; }

      - name: deploy-rs check (static validation)
        run: nix flake check --show-trace

      - name: deploy-rs deploy (with magic rollback)
        run: |
          # --skip-checks: уже сделано в предыдущем шаге, не повторяем
          # --hostname overrides node hostname если нужно (используем из flake)
          nix run github:serokell/deploy-rs -- \
            --skip-checks \
            --ssh-opts "-o StrictHostKeyChecking=yes" \
            .#tsekh-1

      - name: Smoke test — /health endpoint (post-deploy)
        run: |
          # deploy-rs уже подтвердил активацию через SSH. /health — финальный sanity.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://95.216.75.148:8080/health)
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Health endpoint вернул HTTP $STATUS (deploy-rs уже подтвердил activation, но Caddy/health отвечает не штатно)"
          else
            echo "Health check OK: HTTP $STATUS"
          fi
